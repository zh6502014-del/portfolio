<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林艾奭 — UI/UX Designer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="/portfolio/assets/three.min.js"></script>
<script src="/portfolio/assets/GLTFLoader.js"></script>
<style>
/* ══════════════════════════════════════
   Reset
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ══════════════════════════════════════
   Design Tokens — Light
══════════════════════════════════════ */
:root {
  --bg: #ffffff;
  --bg-secondary: #f4f3f0;
  --bg-tertiary: #eceae5;
  --text: #111110;
  --text-secondary: #4a4945;
  --text-tertiary: #88867f;
  --border: rgba(0,0,0,0.13);
  --border-strong: rgba(0,0,0,0.28);
  --accent: #111110;
  --accent-text: #ffffff;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-sans: 'Noto Sans TC', system-ui, sans-serif;
  /* Liquid Glass */
  --nav-bg: rgba(255,255,255,0.65);
  --glass-bg: rgba(255,255,255,0.55);
  --glass-modal-bg: rgba(255,255,255,0.78);
  --glass-border: rgba(0,0,0,0.1);
  --glass-border-strong: rgba(0,0,0,0.2);
  --glass-shine: rgba(255,255,255,0.9);
  --glass-shadow: rgba(0,0,0,0.08);
  --glass-el-bg: rgba(255,255,255,0.6);
  --glass-el-border: rgba(0,0,0,0.08);
  --glass-shine-top: rgba(255,255,255,0.9);
  --glass-shine-bottom: rgba(255,255,255,0.5);
  --glass-pill-border: rgba(0,0,0,0.08);
  --glass-pill-shadow: rgba(0,0,0,0.08);
  --glass-indicator-bg: rgba(255,255,255,0.72);
  --overlay-bg: rgba(0,0,0,0.3);
  --orb-1: rgba(99,179,237,0.45);
  --orb-2: rgba(154,230,180,0.4);
}

/* ── Dark mode ── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0e0d0c; --bg-secondary: #1c1a18; --bg-tertiary: #252320;
    --text: #f0ede8; --text-secondary: #b8b5b0; --text-tertiary: #706d68;
    --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.22);
    --accent: #f0ede8; --accent-text: #0e0d0c;
    --nav-bg: rgba(14,13,12,0.7);
    --glass-bg: rgba(28,26,24,0.6);
    --glass-modal-bg: rgba(20,18,16,0.82);
    --glass-border: rgba(255,255,255,0.12);
    --glass-border-strong: rgba(255,255,255,0.22);
    --glass-shine: rgba(255,255,255,0.06);
    --glass-shadow: rgba(0,0,0,0.4);
    --glass-el-bg: rgba(255,255,255,0.07);
    --glass-el-border: rgba(255,255,255,0.12);
    --glass-shine-top: rgba(255,255,255,0.18);
    --glass-shine-bottom: rgba(255,255,255,0.06);
    --glass-pill-border: rgba(255,255,255,0.1);
    --glass-pill-shadow: rgba(0,0,0,0.3);
    --glass-indicator-bg: rgba(255,255,255,0.12);
    --overlay-bg: rgba(0,0,0,0.6);
    --orb-1: rgba(66,153,225,0.38);
    --orb-2: rgba(72,187,120,0.34);
  }
}
[data-theme="dark"] {
  --bg: #0e0d0c; --bg-secondary: #1c1a18; --bg-tertiary: #252320;
  --text: #f0ede8; --text-secondary: #b8b5b0; --text-tertiary: #706d68;
  --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.22);
  --accent: #f0ede8; --accent-text: #0e0d0c;
  --nav-bg: rgba(14,13,12,0.7);
  --glass-bg: rgba(28,26,24,0.6);
  --glass-modal-bg: rgba(20,18,16,0.82);
  --glass-border: rgba(255,255,255,0.12);
  --glass-border-strong: rgba(255,255,255,0.22);
  --glass-shine: rgba(255,255,255,0.06);
  --glass-shadow: rgba(0,0,0,0.4);
  --glass-el-bg: rgba(255,255,255,0.07);
  --glass-el-border: rgba(255,255,255,0.12);
  --glass-shine-top: rgba(255,255,255,0.18);
  --glass-shine-bottom: rgba(255,255,255,0.06);
  --glass-pill-border: rgba(255,255,255,0.1);
  --glass-pill-shadow: rgba(0,0,0,0.3);
  --glass-indicator-bg: rgba(255,255,255,0.12);
  --overlay-bg: rgba(0,0,0,0.6);
  --orb-1: rgba(66,153,225,0.38);
  --orb-2: rgba(72,187,120,0.34);
}
[data-theme="light"] {
  --bg: #ffffff; --bg-secondary: #f4f3f0; --bg-tertiary: #eceae5;
  --text: #111110; --text-secondary: #4a4945; --text-tertiary: #88867f;
  --border: rgba(0,0,0,0.13); --border-strong: rgba(0,0,0,0.28);
  --accent: #111110; --accent-text: #ffffff;
  --nav-bg: rgba(255,255,255,0.65);
  --glass-el-bg: rgba(255,255,255,0.6);
  --glass-el-border: rgba(0,0,0,0.08);
  --glass-shine-top: rgba(255,255,255,0.9);
  --glass-shine-bottom: rgba(255,255,255,0.5);
  --glass-pill-border: rgba(0,0,0,0.08);
  --glass-pill-shadow: rgba(0,0,0,0.08);
  --glass-indicator-bg: rgba(255,255,255,0.72);
  --orb-1: rgba(99,179,237,0.45);
  --orb-2: rgba(154,230,180,0.4);
}

/* ══════════════════════════════════════
   Theme transition
══════════════════════════════════════ */
html.theme-transitioning,
html.theme-transitioning *,
html.theme-transitioning *::before,
html.theme-transitioning *::after {
  transition:
    background-color 0.5s cubic-bezier(0.4,0,0.2,1),
    color 0.5s cubic-bezier(0.4,0,0.2,1),
    border-color 0.5s cubic-bezier(0.4,0,0.2,1) !important;
}

/* ══════════════════════════════════════
   Base
══════════════════════════════════════ */
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 20px;
  line-height: 1.7;
  min-height: 100vh;
  position: relative;
}

/* Background orbs */
body::before, body::after {
  content: ''; position: fixed; pointer-events: none;
  z-index: 0; border-radius: 50%; filter: blur(80px); opacity: 1;
}
body::before {
  width: 600px; height: 600px; top: -100px; right: -100px;
  background: radial-gradient(circle, var(--orb-1) 0%, transparent 70%);
}
body::after {
  width: 500px; height: 500px; bottom: 10%; left: -80px;
  background: radial-gradient(circle, var(--orb-2) 0%, transparent 70%);
}

/* SVG filter for glass distortion */
#glass-distort { position: absolute; width: 0; height: 0; }

/* ══════════════════════════════════════
   Layout
══════════════════════════════════════ */
.wrapper {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 40px;
  position: relative;
  z-index: 1;
}
section {
  padding: 80px 0;
  position: relative;
  z-index: 1;
}

/* ══════════════════════════════════════
   Nav
══════════════════════════════════════ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--nav-bg);
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  box-shadow: 0 1px 0 var(--glass-border), inset 0 1px 0 var(--glass-shine);
}
.nav-inner {
  max-width: 860px; margin: 0 auto; padding: 0 40px;
  display: flex; align-items: center; gap: 32px;
  height: 60px;
}
.nav-spacer { flex: 1; }
.nav-logo {
  font-size: 18px; font-weight: 500;
  color: var(--text); text-decoration: none;
}
.nav-links {
  position: relative; display: flex; gap: 0;
  align-items: center; padding: 4px;
  border-radius: 99em;
}
.nav-links::after {
  content: ''; position: absolute;
  top: 4px; left: 4px;
  width: var(--pill-w, 52px);
  height: calc(100% - 8px);
  border-radius: 99em;
  background: var(--glass-indicator-bg);
  box-shadow:
    inset 0 0 0 1px var(--glass-pill-border),
    inset 2px 1px 0 -1px var(--glass-shine-top),
    inset -1.5px -1px 0 -1px var(--glass-shine-bottom),
    0 2px 8px 0 var(--glass-pill-shadow);
  z-index: 0;
  translate: var(--pill-x, 0px) 0;
  transition: translate 400ms cubic-bezier(1,0,0.4,1), width 400ms cubic-bezier(1,0,0.4,1);
}
.nav-links.hover-slide::after { animation: pillStretch 360ms cubic-bezier(1,0,0.4,1); }
@keyframes pillStretch { 0%,100%{scale:1 1} 45%{scale:1.2 1} }
.nav-link {
  position: relative; z-index: 1;
  font-size: 16px; color: var(--text-secondary);
  text-decoration: none; padding: 6px 14px;
  border-radius: 99em; border: none;
  background: none; cursor: pointer;
  font-family: var(--font-sans);
  transition: color 200ms; white-space: nowrap;
}
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--text); font-weight: 500; }

/* Theme toggle */
.theme-toggle {
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 17px;
  transition: background .15s, border-color .15s;
  flex-shrink: 0; position: relative;
}
.theme-toggle:hover { background: var(--bg-secondary); border-color: var(--border-strong); }
.theme-toggle::after {
  content: attr(data-tip);
  position: absolute; top: calc(100% + 10px); left: 50%;
  transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  font-size: 13px; white-space: nowrap;
  padding: 5px 10px; border-radius: 6px;
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s; z-index: 9999;
}
.theme-toggle::before {
  content: ''; position: absolute; top: calc(100% + 3px); left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-bottom-color: var(--text);
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s; z-index: 9999;
}
.theme-toggle:hover::after, .theme-toggle:hover::before { opacity: 1; }

/* ══════════════════════════════════════
   Glass el (Liquid Glass 基礎元件)
══════════════════════════════════════ */
.glass-el {
  background: var(--glass-el-bg);
  border: 1px solid var(--glass-el-border);
  backdrop-filter: blur(12px) saturate(160%);
  -webkit-backdrop-filter: blur(12px) saturate(160%);
  box-shadow:
    inset 0 0 0 1px var(--glass-shine-top),
    inset 1.5px 2px 0 -1.5px var(--glass-shine-top),
    inset -1.5px -2px 0 -1.5px var(--glass-shine-bottom),
    0 2px 12px 0 var(--glass-pill-shadow);
  transition: box-shadow .2s;
}
.glass-el:hover { animation: glassStretch 360ms cubic-bezier(1,0,0.4,1); }
.glass-card:hover { animation: glassStretchCard 360ms cubic-bezier(1,0,0.4,1); }
@keyframes glassStretch { 0%,100%{scale:1 1} 45%{scale:1.08 1} }
@keyframes glassStretchCard { 0%,100%{scale:1 1} 45%{scale:1.04 1} }

/* ── Tag 共享 glass 外觀 ── */
.tag, .skill-tag, .note-type {
  font-size: 13px; padding: 4px 12px; border-radius: 100px;
  color: var(--text-secondary); display: inline-block;
  background: var(--glass-el-bg);
  border: 1px solid var(--glass-el-border);
  backdrop-filter: blur(12px) saturate(160%);
  -webkit-backdrop-filter: blur(12px) saturate(160%);
  box-shadow:
    inset 0 0 0 1px var(--glass-shine-top),
    inset 1.5px 2px 0 -1.5px var(--glass-shine-top),
    inset -1.5px -2px 0 -1.5px var(--glass-shine-bottom),
    0 2px 8px 0 var(--glass-pill-shadow);
  transition: box-shadow .2s;
}
.tag:hover, .skill-tag:hover, .note-type:hover {
  animation: glassStretch 360ms cubic-bezier(1,0,0.4,1);
}

/* Skeleton */
.skeleton {
  background: var(--bg-secondary); border-radius: var(--radius-sm);
  display: inline-block; animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ══════════════════════════════════════
   Hero
══════════════════════════════════════ */
.hero {
  position: relative;
  /* 補 nav 高度 */
  padding-top: 60px;
}
.hero-inner {
  position: relative;
  max-width: 860px;
  margin: 0 auto;
  padding: 80px 40px 80px;
  min-height: calc(80vh - 60px);
  display: flex;
  align-items: center;
  overflow: hidden;
}
/* 文字內容：自然佔滿，不設任何 max-width 或 padding-right */
.hero-content {
  position: relative;
  z-index: 2;
}
/* 3D 模型：absolute 疊在右側背景，完全不影響文字版面 */
.hero-model {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 55%;
  z-index: 1;
  pointer-events: none;
  opacity: 0.45;
}
.hero-model canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}

/* Loading UI */
.model-loader {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  transition: opacity 0.6s ease;
}
.model-loader.hidden { opacity: 0; pointer-events: none; }
.model-skeleton {
  width: 180px; height: 220px;
  border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
  background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
  animation: skelPulse 1.6s ease-in-out infinite;
  position: relative; overflow: hidden;
}
.model-skeleton::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
  animation: skelShimmer 1.6s ease-in-out infinite;
}
@keyframes skelPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes skelShimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
.model-progress-wrap {
  width: 140px; display: flex; flex-direction: column;
  align-items: center; gap: 8px;
}
.model-progress-bar {
  width: 100%; height: 2px;
  background: var(--bg-tertiary); border-radius: 2px; overflow: hidden;
}
.model-progress-fill {
  height: 100%; width: 35%;
  background: var(--text); border-radius: 2px;
  animation: barSlide 1.4s ease-in-out infinite;
}
@keyframes barSlide {
  0%   { transform: translateX(-150%); }
  100% { transform: translateX(400%); }
}
.model-progress-text { font-size: 11px; color: var(--text-tertiary); letter-spacing: .06em; }

/* Hero 文字元件 */
.hero-title {
  font-size: clamp(44px,6vw,68px); font-weight: 700;
  line-height: 1.15; letter-spacing: -.02em; margin-bottom: 24px;
}
.hero-desc {
  font-size: 22px; color: var(--text-secondary);
  max-width: 520px; line-height: 1.9; margin-bottom: 44px;
}
.hero-contacts { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 32px; }
.contact-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; color: var(--text-secondary);
  border-radius: 100px; padding: 8px 18px;
  text-decoration: none; cursor: pointer;
}
.hero-note {
  font-size: 14px; color: var(--text-tertiary);
  padding: 10px 14px;
  border-left: 2px solid var(--border-strong);
  background: var(--bg-secondary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  max-width: 420px;
}

/* ══════════════════════════════════════
   Skills & Tools
══════════════════════════════════════ */
.sec-label {
  font-size: 13px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 24px;
}
.skill-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 14px; margin-bottom: 56px;
}
.skill-card { border-radius: var(--radius-lg); padding: 20px; }
.skill-card-icon {
  width: 36px; height: 36px; background: var(--bg-secondary);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px; font-size: 18px;
}
.skill-card-title { font-size: 16px; font-weight: 500; margin-bottom: 10px; }
.skill-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tools-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.tool-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; padding: 14px 18px;
  border-radius: var(--radius-md); color: var(--text-secondary);
}
.tool-name { font-weight: 500; color: var(--text); font-size: 16px; }
.tool-desc { font-size: 13px; color: var(--text-tertiary); }

/* ══════════════════════════════════════
   Projects
══════════════════════════════════════ */
.projects-grid { border-top: 1px solid var(--border); }
.project-row {
  display: grid; grid-template-columns: 1fr auto;
  align-items: start; gap: 16px;
  padding: 32px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.project-row:hover .project-row-title { color: var(--text); }
.project-row-num { font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; }
.project-row-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; color: var(--text); transition: color .15s; }
.project-row-desc {
  font-size: 16px; color: var(--text-secondary); line-height: 1.7;
  max-width: 520px; margin-bottom: 12px;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.project-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-top: 22px; }
.project-time { font-size: 14px; color: var(--text-tertiary); white-space: nowrap; }
.project-cover { width: 160px; height: 90px; object-fit: cover; border-radius: var(--radius-md); border: 1px solid var(--border); flex-shrink: 0; display: block; }
.project-cover-empty { width: 160px; height: 90px; border-radius: var(--radius-md); border: 1px dashed var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); }
.project-cover-empty-icon { font-size: 20px; opacity: 0.25; }

/* ══════════════════════════════════════
   Notes
══════════════════════════════════════ */
.notes-list { border-top: 1px solid var(--border); }
.note-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 22px 0; border-bottom: 1px solid var(--border); gap: 16px; cursor: pointer; transition: opacity .15s; }
.note-item:hover { opacity: 0.7; }
.note-date { font-size: 14px; color: var(--text-tertiary); white-space: nowrap; }
.note-title { font-size: 18px; color: var(--text); margin-bottom: 8px; }
.note-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.note-empty { font-size: 16px; color: var(--text-tertiary); padding: 32px 0; }

/* ══════════════════════════════════════
   Modal
══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--overlay-bg);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--glass-modal-bg);
  backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%; max-width: 860px; max-height: 88vh;
  display: flex; flex-direction: column;
  transform: translateY(32px); transition: transform .25s cubic-bezier(.16,1,.3,1);
  border: 1px solid var(--glass-border); border-bottom: none;
  box-shadow: 0 -4px 40px var(--glass-shadow), inset 0 1px 0 var(--glass-shine);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--glass-modal-bg);
  backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-bottom: 1px solid var(--glass-border);
  padding: 20px 28px 16px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-shrink: 0;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.modal-header-left { flex: 1; min-width: 0; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg-secondary); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text-secondary);
  transition: background .15s; flex-shrink: 0; margin-top: 2px;
}
.modal-close:hover { background: var(--bg-tertiary); }
.modal-body { overflow-y: auto; padding: 28px 28px 56px; flex: 1; }

    if (p.phone) html += `<span class="contact-item glass-el"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.5 10.5a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.41 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${p.phone}</span>`;

function renderProjects(data) {
  const grid = document.getElementById('projects-grid');
  if (!data.length) { grid.innerHTML = '<p style="color:var(--text-tertiary);padding:32px 0">尚無作品</p>'; return; }

    const left = document.createElement('div');
    left.innerHTML = `
      <div class="project-row-num">0${i+1}</div>
      <div class="project-row-title">${p.title||''}</div>
      <div class="project-row-desc">${stripHtml(p.description||'')}</div>

    const right = document.createElement('div');
    right.className = 'project-row-right';

    if (imgs.length) {
      const img = document.createElement('img');

      right.appendChild(img);
    } else {
      right.appendChild(emptyDiv());

    row.appendChild(left);
    row.appendChild(right);
    grid.appendChild(row);

  const d = document.createElement('div');

function renderNotes(data) {

/* ── Stored data for modal ── */
let _projects = [];
let _notes    = [];

async function openModal(id) {
  if (!_projects.length) {
    const { data } = await sb.from('projects').select('*').eq('id', id).single();
    if (data) showModal(data);
  } else {
    const p = _projects.find(x => x.id === id);
    if (p) showModal(p);

}
async function openNote(id) {
  const { data } = await sb.from('notes').select('*').eq('id', id).single();
  if (!data) return;
  document.getElementById('modal-meta').innerHTML = `<span class="modal-time">${formatDate(data.note_date)}</span>${(data.note_type||'').split('·').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="note-type">${t}</span>`).join('')}`;
  document.getElementById('modal-title').textContent = data.title || '';
  document.getElementById('modal-body').innerHTML = `<div class="note-content">${data.content||''}</div>`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showModal(p) {
  const imgs = parseImgArr(p.images);
  const sections = p.sections || [];
  let body = '';
  if (imgs.length) body += `<div class="modal-cover-wrap"><img src="${imgs[0]}" alt="${p.title||''}"></div>`;
  if (sections.length) {
    body += '<div class="modal-sections">';
    sections.forEach(s => {
      body += `<div class="modal-block glass-el"><div class="modal-block-label">${s.title||''}</div><ul>${(s.items||[]).map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    });
    body += '</div>';
  }
  if (p.content) body += `<div class="modal-desc">${p.content}</div>`;
  document.getElementById('modal-meta').innerHTML = `${p.time_range?`<span class="modal-time">${p.time_range}</span>`:''}${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}`;
  document.getElementById('modal-title').textContent = p.title || '';
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── Helpers ── */
function parseImgArr(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(Boolean);
  try { const a = JSON.parse(val); return Array.isArray(a) ? a.filter(Boolean) : []; } catch { return []; }
}
function stripHtml(html) { const d = document.createElement('div'); d.innerHTML = html; return d.textContent || d.innerText || ''; }
function formatDate(d) { if (!d) return ''; const [y,m,day] = d.split('-'); return `${y}.${m}.${day}`; }

/* ══════════════════════════════════════
   Theme
══════════════════════════════════════ */
function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
function getTheme() { return localStorage.getItem('theme') || 'system'; }
function applyTheme(theme) {
  const resolved = theme === 'system' ? getSystemTheme() : theme;
  document.documentElement.setAttribute('data-theme', resolved);
  const btn = document.getElementById('theme-toggle');
  const tips = { system: '跟隨系統', dark: '深色模式', light: '淺色模式' };
  const icons = { light: '☀️', dark: '🌙', system: '🌓' };
  if (btn) { btn.textContent = icons[theme] || '🌓'; btn.setAttribute('data-tip', tips[theme] || ''); }
}
function toggleTheme() {
  const cycle = { system: 'dark', dark: 'light', light: 'system' };
  const next = cycle[getTheme()] || 'dark';
  localStorage.setItem('theme', next);
  document.documentElement.classList.add('theme-transitioning');
  setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 550);
  applyTheme(next);
}
applyTheme(getTheme());
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (getTheme() === 'system') applyTheme('system');
});

  const { x, w } = getPillMetrics(link);
  const nl = document.getElementById('nav-links');
  nl.style.setProperty('--pill-x', x + 'px');
  nl.style.setProperty('--pill-w', w + 'px');
}
function movePillTo(link) {
  const { x, w } = getPillMetrics(link);
  const nl = document.getElementById('nav-links');
  nl.classList.remove('hover-slide');
  void nl.offsetWidth;
  nl.classList.add('hover-slide');
  nl.style.setProperty('--pill-x', x + 'px');
  nl.style.setProperty('--pill-w', w + 'px');
}

const navLinks = document.querySelectorAll('.nav-link');
navLinks.forEach(link => {
  link.addEventListener('mouseenter', () => movePillTo(link));
  link.addEventListener('mouseleave', () => {
    const active = document.querySelector('.nav-link.active');
    if (active) setPillPosition(active);
  });
});

const sections = ['about','projects','notes'];
function updateNav() {
  let current = 'about';
  sections.forEach(id => {
    const el = document.getElementById(id);
    if (el && window.scrollY >= el.offsetTop - 100) current = id;
  });
  navLinks.forEach(link => link.classList.toggle('active', link.dataset.section === current));
  const active = document.querySelector('.nav-link.active');
  if (active) setPillPosition(active);
}
window.addEventListener('scroll', updateNav, { passive: true });
window.addEventListener('load', () => { updateNav(); });

/* ══════════════════════════════════════
   Three.js — 3D Model
══════════════════════════════════════ */
function initThree() {
  const THREE = window.THREE;
  const container = document.getElementById('hero-model');
  if (!THREE || !container) return;
  if (!THREE.GLTFLoader) { setTimeout(initThree, 100); return; }

  // 取 hero-inner 的實際高度
  const heroInner = document.getElementById('hero-inner');
  const w = container.offsetWidth || (heroInner ? heroInner.offsetWidth * 0.55 : window.innerWidth * 0.55);
  const h = (heroInner ? heroInner.offsetHeight : 0) || window.innerHeight * 0.75;
  if (w < 10 || h < 10) { setTimeout(initThree, 300); return; }

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  camera.position.set(0, 0.05, 3.0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h);
  renderer.outputEncoding  = THREE.sRGBEncoding;
  renderer.toneMapping     = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(2, 3, 2); scene.add(dir);
  const fill = new THREE.DirectionalLight(0x8ab4f8, 0.3);
  fill.position.set(-2, 0, 1); scene.add(fill);

  let davidMesh = null;
  new THREE.GLTFLoader().load(
    '/portfolio/assets/head_of_michelangelos_david_optimised.glb',
    function(gltf) {
      const model = gltf.scene;
      const box    = new THREE.Box3().setFromObject(model);
      const center = new THREE.Vector3();
      const size   = new THREE.Vector3();
      box.getCenter(center);
      box.getSize(size);
      const sc = 1.8 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(sc);
      model.position.set(-center.x * sc, -center.y * sc, -center.z * sc);
      model.rotation.y = -0.15;
      scene.add(model);
      davidMesh = model;
      const loader = document.getElementById('model-loader');
      if (loader) loader.classList.add('hidden');
      (function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }());
    },
    null,
    err => console.error('GLB error:', err)
  );

  // scroll → 水平順時針旋轉
  window.addEventListener('scroll', () => {
    if (!davidMesh) return;
    davidMesh.rotation.y = -0.15 + (window.scrollY / window.innerHeight) * Math.PI * 2;
  }, { passive: true });

  // resize
  window.addEventListener('resize', () => {
    const hi = document.getElementById('hero-inner');
    const nw = container.offsetWidth || (hi ? hi.offsetWidth * 0.55 : w);
    const nh = (hi ? hi.offsetHeight : 0) || window.innerHeight * 0.75;
    if (nw < 10) return;
    camera.aspect = nw / nh;
    camera.updateProjectionMatrix();
    renderer.setSize(nw, nh);
  });
}

/* ══════════════════════════════════════
   Init
══════════════════════════════════════ */
loadData();
window.addEventListener('load', initThree);
</script>

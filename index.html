<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林艾奭 — UI/UX Designer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f4f3f0; --bg-tertiary: #eceae5;
    --text: #111110; --text-secondary: #4a4945; --text-tertiary: #88867f;
    --border: rgba(0,0,0,0.13); --border-strong: rgba(0,0,0,0.28);
    --accent: #111110; --accent-text: #ffffff;
    --radius-sm:6px; --radius-md:8px; --radius-lg:12px;
    --font-sans:'Noto Sans TC',system-ui,sans-serif;
    --font-serif:'Noto Serif TC',serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0e0d0c; --bg-secondary:#1c1a18; --bg-tertiary:#252320;
      --text:#f0ede8; --text-secondary:#b8b5b0; --text-tertiary:#706d68;
      --border:rgba(255,255,255,0.1); --border-strong:rgba(255,255,255,0.22);
      --accent:#f0ede8; --accent-text:#0e0d0c;
    }
  }
  [data-theme="dark"] {
    --bg:#0e0d0c; --bg-secondary:#1c1a18; --bg-tertiary:#252320;
    --text:#f0ede8; --text-secondary:#b8b5b0; --text-tertiary:#706d68;
    --border:rgba(255,255,255,0.1); --border-strong:rgba(255,255,255,0.22);
    --accent:#f0ede8; --accent-text:#0e0d0c;
  }
  [data-theme="light"] {
    --bg:#ffffff; --bg-secondary:#f8f8f7; --bg-tertiary:#f3f2ef;
    --text:#1a1917; --text-secondary:#5c5b58; --text-tertiary:#9b9a97;
    --border:rgba(0,0,0,0.1); --border-strong:rgba(0,0,0,0.2);
    --accent:#18181b; --accent-text:#ffffff;
  }
  /* Theme toggle button */
  .theme-toggle {
    width:32px; height:32px; border-radius:50%;
    background:transparent; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:15px; transition:background .15s, border-color .15s;
    flex-shrink:0; position:relative;
  }
  .theme-toggle:hover { background:var(--bg-secondary); border-color:var(--border-strong); }
  .theme-toggle::after {
    content: attr(data-tip);
    position:absolute; top:calc(100% + 10px); right:0;
    background:var(--text); color:var(--bg);
    font-size:11px; white-space:nowrap;
    padding:5px 10px; border-radius:6px;
    pointer-events:none; opacity:0;
    transition:opacity 0.15s;
    font-family:var(--font-sans);
    z-index:9999;
  }
  .theme-toggle::before {
    content:''; position:absolute; top:calc(100% + 4px); right:10px;
    border:5px solid transparent;
    border-bottom-color:var(--text);
    pointer-events:none; opacity:0;
    transition:opacity 0.15s;
    z-index:9999;
  }
  .theme-toggle:hover::after,
  .theme-toggle:hover::before { opacity:1; }
  html { scroll-behavior: smooth; }
  html.theme-transitioning,
  html.theme-transitioning *,
  html.theme-transitioning *::before,
  html.theme-transitioning *::after {
    transition: background-color 0.5s cubic-bezier(0.4,0,0.2,1),
      color 0.5s cubic-bezier(0.4,0,0.2,1),
      border-color 0.5s cubic-bezier(0.4,0,0.2,1) !important;
  }
  body { font-family:var(--font-sans); background:var(--bg); color:var(--text); line-height:1.7; font-size:15px; min-height:100vh; }

  .nav { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); backdrop-filter:blur(12px); overflow:visible; }
  .nav-inner { max-width:780px; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; overflow:visible; }
  .nav-logo { font-family:var(--font-serif); font-size:15px; font-weight:500; color:var(--text); text-decoration:none; }
  .nav-links { display:flex; gap:4px; }
  .nav-link { font-size:13px; color:var(--text-secondary); text-decoration:none; padding:6px 12px; border-radius:var(--radius-md); transition:background .15s,color .15s; border:1px solid transparent; }
  .nav-link:hover { background:var(--bg-secondary); color:var(--text); }
  .nav-link.active { background:var(--bg-secondary); border-color:var(--border); color:var(--text); }

  .wrapper { max-width:780px; margin:0 auto; padding:0 24px; }
  section { padding:56px 0; }
  section + section { border-top:1px solid var(--border); }

  .hero { padding-top:72px; padding-bottom:64px; }
  .hero-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-tertiary); background:var(--bg-secondary); border:1px solid var(--border); border-radius:100px; padding:5px 14px; margin-bottom:28px; white-space:nowrap; }
  .hero-badge-dot { width:6px; height:6px; min-width:6px; background:#22c55e; border-radius:50%; display:inline-block; }
  .hero-title { font-family:var(--font-serif); font-size:clamp(40px,5.5vw,60px); font-weight:500; line-height:1.2; letter-spacing:-.025em; margin-bottom:20px; }
  .hero-title em { font-style:normal; color:var(--text-tertiary); }
  .hero-desc { font-size:16px; color:var(--text-secondary); max-width:520px; line-height:1.9; margin-bottom:36px; }
  .hero-contacts { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px; }
  .contact-item { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-secondary); background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-md); padding:7px 14px; text-decoration:none; transition:border-color .15s,color .15s; }
  .contact-item:hover { border-color:var(--border-strong); color:var(--text); }
  .hero-note { font-size:12px; color:var(--text-tertiary); padding:10px 14px; border-left:2px solid var(--border-strong); background:var(--bg-secondary); border-radius:0 var(--radius-sm) var(--radius-sm) 0; max-width:420px; }

  .sec-label { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:24px; }
  .skill-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:40px; }
  .skill-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; transition:border-color .15s; }
  .skill-card:hover { border-color:var(--border-strong); }
  .skill-card-icon { width:36px; height:36px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; margin-bottom:14px; font-size:18px; }
  .skill-card-title { font-size:13px; font-weight:500; margin-bottom:10px; }
  .skill-tag-list { display:flex; flex-wrap:wrap; gap:5px; }
  .skill-tag { font-size:11px; padding:2px 8px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:100px; color:var(--text-secondary); }
  .tools-grid { display:flex; flex-wrap:wrap; gap:8px; }
  .tool-item { display:flex; align-items:center; gap:8px; font-size:13px; padding:8px 16px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-md); color:var(--text-secondary); transition:border-color .15s; }
  .tool-item:hover { border-color:var(--border-strong); }
  .tool-name { font-weight:500; color:var(--text); font-size:13px; }
  .tool-desc { font-size:11px; color:var(--text-tertiary); }

  .projects-grid { display:flex; flex-direction:column; }
  .project-row { display:grid; grid-template-columns:1fr auto; align-items:start; gap:16px; padding:24px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .project-row:first-child { border-top:1px solid var(--border); }
  .project-row:hover .project-row-title { color:var(--text); }
  .project-row:hover .project-arrow { opacity:1; transform:translateX(2px); }
  .project-row-num { font-size:11px; color:var(--text-tertiary); font-family:var(--font-serif); margin-bottom:6px; }
  .project-row-title { font-size:18px; font-weight:600; margin-bottom:8px; color:var(--text); transition:color .15s; }
  .project-row-desc { font-size:13px; color:var(--text-secondary); line-height:1.7; max-width:520px; margin-bottom:12px; }
  .project-tags { display:flex; flex-wrap:wrap; gap:5px; }
  .tag { font-size:11px; padding:2px 8px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:100px; color:var(--text-secondary); }
  .project-row-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; padding-top:22px; }
  .project-time { font-size:11px; color:var(--text-tertiary); white-space:nowrap; }
  .project-arrow { font-size:16px; color:var(--text-tertiary); opacity:0; transition:opacity .15s,transform .15s; }

  .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.4); display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--bg); border-radius:var(--radius-lg) var(--radius-lg) 0 0; width:100%; max-width:780px; max-height:88vh; overflow-y:auto; padding:32px 32px 48px; transform:translateY(32px); transition:transform .25s cubic-bezier(.16,1,.3,1); border:1px solid var(--border); border-bottom:none; position:relative; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:40px; height:4px; background:var(--border-strong); border-radius:2px; margin:0 auto 28px; }
  .modal-close { position:absolute; top:24px; right:24px; width:32px; height:32px; border-radius:50%; background:var(--bg-secondary); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:var(--text-secondary); transition:background .15s; }
  .modal-close:hover { background:var(--bg-tertiary); }
  .modal-title { font-family:var(--font-serif); font-size:24px; font-weight:500; margin-bottom:6px; }
  .modal-meta { display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-bottom:20px; }
  .modal-time { font-size:12px; color:var(--text-tertiary); margin-right:4px; }
  .modal-desc { font-size:14px; color:var(--text-secondary); line-height:1.85; margin-bottom:28px; }
  .modal-desc h1 { font-size:20px; font-weight:600; margin:16px 0 8px; color:var(--text); }
  .modal-desc h2 { font-size:17px; font-weight:600; margin:14px 0 6px; color:var(--text); }
  .modal-desc h3 { font-size:15px; font-weight:600; margin:12px 0 4px; color:var(--text); }
  .modal-desc p { margin:5px 0; }
  .modal-desc strong { font-weight:600; color:var(--text); }
  .modal-desc img { max-width:100%; border-radius:var(--radius-md); margin:10px 0; display:block; }
  .modal-desc blockquote { border-left:3px solid var(--border-strong); padding-left:14px; color:var(--text-tertiary); margin:10px 0; }
  .modal-desc ul, .modal-desc ol { padding-left:22px; margin:6px 0; }
  .modal-desc li { margin:3px 0; }
  .modal-desc a { color:var(--text); text-decoration:underline; }
  .modal-desc iframe, .modal-desc .ql-video { width:100%; aspect-ratio:16/9; border-radius:var(--radius-md); border:none; margin:12px 0; display:block; }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px; }
  .modal-block { background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; }
  .modal-block-label { font-size:10px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:10px; }
  .modal-block ul { list-style:none; }
  .modal-block li { font-size:13px; color:var(--text-secondary); padding:3px 0; display:flex; gap:8px; }
  .modal-block li::before { content:'—'; color:var(--text-tertiary); flex-shrink:0; }

  .modal-images { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
  .modal-images img { width:160px; height:110px; object-fit:cover; border-radius:var(--radius-md); border:1px solid var(--border); }
  .note-item { display:flex; justify-content:space-between; align-items:center; padding:18px 0; border-bottom:1px solid var(--border); gap:16px; cursor:pointer; transition:opacity .15s; }
  .note-item:hover { opacity:0.75; }
  .note-content { font-size:14px; color:var(--text-secondary); line-height:1.85; }
  .note-content h1 { font-size:20px; font-weight:600; margin:18px 0 8px; color:var(--text); }
  .note-content h2 { font-size:17px; font-weight:600; margin:16px 0 6px; color:var(--text); }
  .note-content h3 { font-size:15px; font-weight:600; margin:14px 0 4px; color:var(--text); }
  .note-content p { margin:6px 0; }
  .note-content img { max-width:100%; border-radius:var(--radius-md); margin:12px 0; display:block; }
  .note-content blockquote { border-left:3px solid var(--border-strong); padding-left:14px; color:var(--text-tertiary); margin:10px 0; }
  .note-content ul, .note-content ol { padding-left:22px; margin:6px 0; }
  .note-content li { margin:3px 0; }
  .note-content a { color:var(--text); text-decoration:underline; }
  .note-content strong { font-weight:600; color:var(--text); }
  .note-content iframe, .note-content .ql-video { width:100%; aspect-ratio:16/9; border-radius:var(--radius-md); border:none; margin:12px 0; display:block; }
  .note-empty { font-size:13px; color:var(--text-tertiary); padding:20px 0; }

  .notes-list { display:flex; flex-direction:column; }
  .note-item:first-child { border-top:1px solid var(--border); }
  .note-date { font-size:12px; color:var(--text-tertiary); font-family:var(--font-serif); white-space:nowrap; }
  .note-title { font-size:14px; color:var(--text); flex:1; }
  .note-type { font-size:11px; padding:2px 8px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:100px; color:var(--text-tertiary); white-space:nowrap; }

  footer { border-top:1px solid var(--border); padding:40px 0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  .footer-name { font-family:var(--font-serif); font-size:14px; color:var(--text-secondary); }
  .footer-link { font-size:13px; color:var(--text-tertiary); text-decoration:none; }
  .footer-link:hover { color:var(--text); }
  .skeleton { background:var(--bg-secondary); border-radius:var(--radius-sm); display:inline-block; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }


  @media (max-width:560px) {
    .modal { padding:24px 20px 40px; }
    .modal-grid { grid-template-columns:1fr; }
    .hero-title { font-size:32px; }
    .project-row { grid-template-columns:1fr; }
    .project-row-right { flex-direction:row; padding-top:0; }
    .note-item { flex-wrap:wrap; }
  }
</style>
</head>

<script>
// ── Supabase 連線設定（直接寫在這裡）──
const SUPABASE_URL = 'https://wlxlhyieypohktsvwuuc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndseGxoeWlleXBvaGt0c3Z3dXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTYxNTAsImV4cCI6MjA5NTM3MjE1MH0.KbgbCGBCoJA6ybawKDTHp6w-Tl_dGpE0RVgbaiFgv3Y';

let sbClient = null;

async function loadData() {
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const [profileRes, skillsRes, toolsRes, projectsRes, notesRes] = await Promise.all([
      sbClient.from('profile').select('*').single(),
      sbClient.from('skills').select('*').order('sort_order'),
      sbClient.from('tools').select('*').order('sort_order'),
      sbClient.from('projects').select('*').eq('published', true).order('sort_order'),
      sbClient.from('notes').select('*').eq('published', true).order('sort_order')
    ]);
    if (profileRes.data) renderProfile(profileRes.data);
    if (skillsRes.data) renderSkills(skillsRes.data);
    if (toolsRes.data) renderTools(toolsRes.data);
    if (projectsRes.data) renderProjects(projectsRes.data);
    if (notesRes.data) renderNotes(notesRes.data);
  } catch (e) { renderFallback(); }
}

function renderProfile(p) {
  document.getElementById('hero-status').textContent = (p.status || '目前在職 · 金融業數位設計').split('').filter(c => c.charCodeAt(0) > 31 || c === ' ').join('').trim();
  document.getElementById('hero-name').textContent = (p.name || '林艾奭').trim();
  document.getElementById('hero-desc').innerHTML = p.description || '';
  document.getElementById('hero-note').textContent = p.note || '';
  document.getElementById('nav-name').textContent = p.name || '林艾奭';
  document.getElementById('footer-name').textContent = (p.name || '林艾奭') + ' · UI/UX Designer';
  const contacts = document.getElementById('hero-contacts');
  contacts.innerHTML = '';

function openNote(id) {
  const n = allNotes.find(x => x.id === id);

    : '';

    ? `<div class="note-content">${n.content}</div>`
    : `<p class="note-empty">此篇隨筆尚未加入內容。</p>`;
  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <span class="note-type">${n.note_type || ''}</span>
      <span style="font-size:12px;color:var(--text-tertiary)">${formatDate(n.note_date)}</span>
    </div>
    <h2 class="modal-title" style="font-size:20px;margin-bottom:20px">${n.title}</h2>
    ${contentHtml}
    ${imgsHtml}
  `;

  document.body.style.overflow = 'hidden';
}

function openModal(id) {
  const p = allProjects.find(x => x.id === id);
  if (!p) return;
  const liHtml = arr => (arr||[]).map(item=>`<li>${item}</li>`).join('');
  const imgsHtml = (p.images||[]).length ? `<div class="modal-images">${p.images.map(u=>`<img src="${u}" alt="" loading="lazy">`).join('')}</div>` : '';
  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <h2 class="modal-title">${p.title}</h2>
    <div class="modal-meta">
      ${p.time_range ? `<span class="modal-time">${p.time_range}</span>` : ''}
      ${p.members ? p.members.split('·').map(m=>m.trim()).filter(Boolean).map(m=>`<span class="tag">${m}</span>`).join('') : ''}

    <div class="modal-desc">${p.description || ''}</div>
    <div class="modal-grid">

      <div class="modal-block"><p class="modal-block-label">我的角色</p><ul><li>${p.role||''}</li></ul></div>
      ${p.work_items?.length ? `<div class="modal-block"><p class="modal-block-label">我做了什麼</p><ul>${liHtml(p.work_items)}</ul></div>` : ''}
      ${p.products?.length ? `<div class="modal-block"><p class="modal-block-label">接觸的產品</p><ul>${liHtml(p.products)}</ul></div>` : ''}
    </div>
    ${p.insight ? `<div class="modal-insight"><p class="modal-insight-label">設計洞察</p>${p.insight}</div>` : ''}
    ${imgsHtml}
  `;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); document.body.style.overflow = ''; }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Theme toggle ──
function getSystemTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function getTheme() {
  return localStorage.getItem('theme') || 'system';
}
function applyTheme(theme) {
  const effective = theme === 'system' ? getSystemTheme() : theme;
  document.documentElement.setAttribute('data-theme', effective);
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const isSystem = theme === 'system';
  if (effective === 'dark') {
    btn.textContent = '☀️';
    btn.setAttribute('data-tip', isSystem ? '切換為亮色模式（目前跟隨系統：暗色）' : '切換為亮色模式');
  } else {
    btn.textContent = '🌙';
    btn.setAttribute('data-tip', isSystem ? '切換為暗色模式（目前跟隨系統：亮色）' : '切換為暗色模式');
  }
}
function toggleTheme() {
  const current = getTheme();
  const system = getSystemTheme();
  let next;
  if (current === 'system') {
    next = system === 'dark' ? 'light' : 'dark';
  } else {
    next = 'system';
  }
  document.documentElement.classList.add('theme-transitioning');
  localStorage.setItem('theme', next);
  applyTheme(next);
  setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 550);
}
// Listen for system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (getTheme() === 'system') applyTheme('system');
});
// Init on load
applyTheme(getTheme());

  sections.forEach(id => { const el = document.getElementById(id); if (el && window.scrollY >= el.offsetTop - 100) current = id; });

}

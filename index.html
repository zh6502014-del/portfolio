<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林艾奭 — UI/UX Designer</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ══════════════════════════════════════════
     shadcn/ui neutral theme tokens (light)
     https://ui.shadcn.com/docs/theming
     ══════════════════════════════════════════ */
  :root {
    /* ── shadcn 標準 token ── */
    --radius: 0.625rem;
    --background:          oklch(1 0 0);
    --foreground:          oklch(0.145 0 0);
    --card:                oklch(1 0 0);
    --card-foreground:     oklch(0.145 0 0);
    --popover:             oklch(1 0 0);
    --popover-foreground:  oklch(0.145 0 0);
    --primary:             oklch(0.205 0 0);
    --primary-foreground:  oklch(0.985 0 0);
    --secondary:           oklch(0.97 0 0);
    --secondary-foreground:oklch(0.205 0 0);
    --muted:               oklch(0.97 0 0);
    --muted-foreground:    oklch(0.556 0 0);
    --accent:              oklch(0.97 0 0);
    --accent-foreground:   oklch(0.205 0 0);
    --destructive:         oklch(0.577 0.245 27.325);
    --border:              oklch(0.922 0 0);
    --input:               oklch(0.922 0 0);
    --ring:                oklch(0.708 0 0);

    /* ── radius scale（shadcn 規範） ── */
    --radius-sm: calc(var(--radius) * 0.6);
    --radius-md: calc(var(--radius) * 0.8);
    --radius-lg: var(--radius);
    --radius-xl: calc(var(--radius) * 1.4);

    /* ── 相容舊變數（對應到 shadcn token） ── */
    --bg:             var(--background);
    --bg-secondary:   oklch(0.97 0 0);
    --bg-tertiary:    oklch(0.946 0 0);
    --text:           var(--foreground);
    --text-secondary: oklch(0.369 0 0);
    --text-tertiary:  var(--muted-foreground);
    --border-strong:  oklch(0.708 0 0);
    --accent-text:    var(--primary-foreground);

    --font-sans: 'Noto Sans TC', system-ui, sans-serif;
    --font-serif: 'Noto Sans TC', system-ui, sans-serif;

    /* ── 自訂：Liquid Glass (Light) ── */
    --nav-bg:            rgba(255,255,255,0.65);
    --glass-bg:          rgba(255,255,255,0.55);
    --glass-modal-bg:    rgba(255,255,255,0.78);
    --glass-header-bg:   rgba(255,255,255,0.85);
    --glass-tag-bg:      rgba(255,255,255,0.5);
    --glass-border:      oklch(0.922 0 0 / 0.6);
    --glass-border-strong: oklch(0.708 0 0 / 0.5);
    --glass-shine:       rgba(255,255,255,0.9);
    --glass-shadow:      rgba(0,0,0,0.08);
    --overlay-bg:        rgba(0,0,0,0.3);
    --orb-1:             rgba(99,179,237,0.45);
    --orb-2:             rgba(154,230,180,0.4);
    --orb-opacity:       1;

    /* ── 自訂：Glass pill (Light) ── */
    --glass-pill-bg:       rgba(0,0,0,0.06);
    --glass-pill-border:   rgba(0,0,0,0.08);
    --glass-indicator-bg:  rgba(255,255,255,0.72);
    --glass-shine-top:     rgba(255,255,255,0.9);
    --glass-shine-bottom:  rgba(255,255,255,0.5);
    --glass-pill-shadow:   rgba(0,0,0,0.08);
    --glass-el-bg:         rgba(255,255,255,0.6);
    --glass-el-border:     rgba(0,0,0,0.08);
  }

  /* ══════════════════════════════════════════
     shadcn/ui neutral theme tokens (dark)
     ══════════════════════════════════════════ */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --background:          oklch(0.145 0 0);
      --foreground:          oklch(0.985 0 0);
      --card:                oklch(0.205 0 0);
      --card-foreground:     oklch(0.985 0 0);
      --popover:             oklch(0.205 0 0);
      --popover-foreground:  oklch(0.985 0 0);
      --primary:             oklch(0.922 0 0);
      --primary-foreground:  oklch(0.205 0 0);
      --secondary:           oklch(0.269 0 0);
      --secondary-foreground:oklch(0.985 0 0);
      --muted:               oklch(0.269 0 0);
      --muted-foreground:    oklch(0.708 0 0);
      --accent:              oklch(0.269 0 0);
      --accent-foreground:   oklch(0.985 0 0);
      --destructive:         oklch(0.704 0.191 22.216);
      --border:              oklch(1 0 0 / 10%);
      --input:               oklch(1 0 0 / 15%);
      --ring:                oklch(0.556 0 0);

      --bg:             var(--background);
      --bg-secondary:   oklch(0.205 0 0);
      --bg-tertiary:    oklch(0.232 0 0);
      --text:           var(--foreground);
      --text-secondary: oklch(0.708 0 0);
      --text-tertiary:  oklch(0.556 0 0);
      --border-strong:  oklch(1 0 0 / 22%);
      --accent-text:    oklch(0.205 0 0);

      --nav-bg:            rgba(14,13,12,0.7);
      --glass-bg:          rgba(28,26,24,0.6);
      --glass-modal-bg:    rgba(20,18,16,0.82);
      --glass-header-bg:   rgba(20,18,16,0.88);
      --glass-tag-bg:      rgba(255,255,255,0.07);
      --glass-border:      oklch(1 0 0 / 12%);
      --glass-border-strong: oklch(1 0 0 / 22%);
      --glass-shine:       rgba(255,255,255,0.06);
      --glass-shadow:      rgba(0,0,0,0.4);
      --overlay-bg:        rgba(0,0,0,0.6);
      --orb-1:             rgba(66,153,225,0.38);
      --orb-2:             rgba(72,187,120,0.34);

      --glass-pill-bg:      rgba(255,255,255,0.06);
      --glass-pill-border:  rgba(255,255,255,0.1);
      --glass-indicator-bg: rgba(255,255,255,0.12);
      --glass-shine-top:    rgba(255,255,255,0.18);
      --glass-shine-bottom: rgba(255,255,255,0.06);
      --glass-pill-shadow:  rgba(0,0,0,0.3);
      --glass-el-bg:        rgba(255,255,255,0.07);
      --glass-el-border:    rgba(255,255,255,0.12);
    }
  }
  [data-theme="dark"] {
    --background:          oklch(0.145 0 0);
    --foreground:          oklch(0.985 0 0);
    --card:                oklch(0.205 0 0);
    --card-foreground:     oklch(0.985 0 0);
    --popover:             oklch(0.205 0 0);
    --popover-foreground:  oklch(0.985 0 0);
    --primary:             oklch(0.922 0 0);
    --primary-foreground:  oklch(0.205 0 0);
    --secondary:           oklch(0.269 0 0);
    --secondary-foreground:oklch(0.985 0 0);
    --muted:               oklch(0.269 0 0);
    --muted-foreground:    oklch(0.708 0 0);
    --accent:              oklch(0.269 0 0);
    --accent-foreground:   oklch(0.985 0 0);
    --destructive:         oklch(0.704 0.191 22.216);
    --border:              oklch(1 0 0 / 10%);
    --input:               oklch(1 0 0 / 15%);
    --ring:                oklch(0.556 0 0);

    --bg:             var(--background);
    --bg-secondary:   oklch(0.205 0 0);
    --bg-tertiary:    oklch(0.232 0 0);
    --text:           var(--foreground);
    --text-secondary: oklch(0.708 0 0);
    --text-tertiary:  oklch(0.556 0 0);
    --border-strong:  oklch(1 0 0 / 22%);
    --accent-text:    oklch(0.205 0 0);

    --nav-bg:            rgba(14,13,12,0.7);
    --glass-bg:          rgba(28,26,24,0.6);
    --glass-modal-bg:    rgba(20,18,16,0.82);
    --glass-header-bg:   rgba(20,18,16,0.88);
    --glass-tag-bg:      rgba(255,255,255,0.07);
    --glass-border:      oklch(1 0 0 / 12%);
    --glass-border-strong: oklch(1 0 0 / 22%);
    --glass-shine:       rgba(255,255,255,0.06);
    --glass-shadow:      rgba(0,0,0,0.4);
    --overlay-bg:        rgba(0,0,0,0.6);
    --orb-1:             rgba(66,153,225,0.38);
    --orb-2:             rgba(72,187,120,0.34);
    --orb-opacity:       1;

    --glass-pill-bg:      rgba(255,255,255,0.06);
    --glass-pill-border:  rgba(255,255,255,0.1);
    --glass-indicator-bg: rgba(255,255,255,0.12);
    --glass-shine-top:    rgba(255,255,255,0.18);
    --glass-shine-bottom: rgba(255,255,255,0.06);
    --glass-pill-shadow:  rgba(0,0,0,0.3);
    --glass-el-bg:        rgba(255,255,255,0.07);
    --glass-el-border:    rgba(255,255,255,0.12);
  }
  [data-theme="light"] {
    --background:          oklch(1 0 0);
    --foreground:          oklch(0.145 0 0);
    --primary:             oklch(0.205 0 0);
    --primary-foreground:  oklch(0.985 0 0);
    --secondary:           oklch(0.97 0 0);
    --muted:               oklch(0.97 0 0);
    --muted-foreground:    oklch(0.556 0 0);
    --border:              oklch(0.922 0 0);
    --input:               oklch(0.922 0 0);
    --ring:                oklch(0.708 0 0);

    --bg:             var(--background);
    --bg-secondary:   oklch(0.97 0 0);
    --bg-tertiary:    oklch(0.946 0 0);
    --text:           var(--foreground);
    --text-secondary: oklch(0.369 0 0);
    --text-tertiary:  oklch(0.556 0 0);
    --border-strong:  oklch(0.708 0 0);
    --accent-text:    var(--primary-foreground);
  }
  /* Theme toggle button */
  .theme-toggle {
    width:32px; height:32px; border-radius:50%;
    background:transparent; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:17px; transition:background .15s, border-color .15s;
    flex-shrink:0; position:relative;
  }
  .theme-toggle:hover { background:var(--bg-secondary); border-color:var(--border-strong); }
  .theme-toggle::after {
    content: attr(data-tip);
    position:absolute; top:calc(100% + 10px); left:50%;
    transform:translateX(-50%);
    background:var(--text); color:var(--bg);
    font-size:13px; white-space:nowrap;
    padding:5px 10px; border-radius:6px;
    pointer-events:none; opacity:0;
    transition:opacity 0.15s;
    font-family:var(--font-sans);
    z-index:9999;
  }
  .theme-toggle::before {
    content:''; position:absolute; top:calc(100% + 3px); left:50%;
    transform:translateX(-50%);
    border:5px solid transparent;
    border-bottom-color:var(--text);
    pointer-events:none; opacity:0;
    transition:opacity 0.15s;
    z-index:9999;
  }
  .theme-toggle:hover::after,
  .theme-toggle:hover::before { opacity:1; }
  html { scroll-behavior: smooth; }
  body::before { opacity: 1; }
  body::after  { opacity: 1; }
  html.theme-transitioning,
  html.theme-transitioning *,
  html.theme-transitioning *::before,
  html.theme-transitioning *::after {
    transition: background-color 0.5s cubic-bezier(0.4,0,0.2,1),
      color 0.5s cubic-bezier(0.4,0,0.2,1),
      border-color 0.5s cubic-bezier(0.4,0,0.2,1) !important;
  }
  body { font-family:var(--font-sans); background:var(--bg); color:var(--text); line-height:1.7; font-size:20px; min-height:100vh; position:relative; }
  /* ── Background orbs for glass effect ── */
  body::before, body::after {
    content:''; position:fixed; pointer-events:none; z-index:0; border-radius:50%;
    filter:blur(80px); opacity:1; transition:opacity 0.5s;
  }
  body::before {
    width:600px; height:600px; top:-100px; right:-100px;
    background:radial-gradient(circle, var(--orb-1) 0%, transparent 70%);
  }
  body::after {
    width:500px; height:500px; bottom:10%; left:-80px;
    background:radial-gradient(circle, var(--orb-2) 0%, transparent 70%);
  }
  .wrapper, .nav-inner, footer { position:relative; z-index:1; }
  section { position:relative; z-index:1; }

  .nav { position:fixed; top:0; left:0; right:0; z-index:100; background:var(--nav-bg); border-bottom:1px solid var(--glass-border); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%); overflow:visible; box-shadow:0 1px 0 var(--glass-border), inset 0 1px 0 var(--glass-shine); }
  main { padding-top:60px; }
  .nav-inner { max-width:860px; margin:0 auto; padding:0 40px; display:flex; align-items:center; justify-content:space-between; height:60px; overflow:visible; }
  .nav-logo { font-size:18px; font-weight:500; color:var(--text); text-decoration:none; }
  .nav-actions { display:flex; align-items:center; gap:8px; }
  /* ── Glass Nav ── */
  .nav-links {
    position: relative;
    display: flex;
    align-items: center;
    padding: 4px 4px;
    border-radius: 99em;
  }
  .nav-links::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 4px;
    width: var(--pill-w, 52px);
    height: calc(100% - 8px);
    border-radius: 99em;
    background: var(--glass-indicator-bg);
    box-shadow:
      inset 0 0 0 1px var(--glass-pill-border),
      inset 2px 1px 0px -1px var(--glass-shine-top),
      inset -1.5px -1px 0px -1px var(--glass-shine-bottom),
      0px 2px 8px 0px var(--glass-pill-shadow);
    z-index: 0;
    translate: var(--pill-x, 0px) 0;
    transition:
      translate 400ms cubic-bezier(1, 0.0, 0.4, 1),
      width 400ms cubic-bezier(1, 0.0, 0.4, 1);
  }
  .nav-links.hover-slide::after { animation: pillStretch 360ms cubic-bezier(1, 0.0, 0.4, 1); }
  @keyframes pillStretch { 0%,100%{scale:1 1} 45%{scale:1.2 1} }
  .nav-link {
    position: relative; z-index: 1;
    font-size: 16px; color: var(--text-secondary);
    text-decoration: none; padding: 6px 14px;
    border-radius: 99em; border: none;
    transition: color 200ms;
    white-space: nowrap;
  }
  .nav-link:hover { color: var(--text); }
  .nav-link.active { color: var(--text); font-weight: 500; }

  .wrapper { max-width:860px; margin:0 auto; padding:0 40px; }
  section { padding:80px 0; }

  /* hero：左右距離與 wrapper 一致，position:relative 作為 hero-3d 的定位基準 */
  .hero {
    padding-top:96px;
    padding-bottom:88px;
    max-width:860px;
    margin:0 auto;
    padding-left:40px;
    padding-right:40px;
    position:relative;
    z-index:10;
  }
  /* hero-text：只佔左半部，留出右側空間給 absolute 的模型 */
  .hero-text {
    position:relative;
    z-index:2;
  }
  /* hero-3d：absolute，貼 hero 右上角，z-index 高於下層內容 */
  .hero-3d {
    position:fixed;
    top:100px;
    right:100px;
    width:400px;
    height:460px;
    overflow:visible;
    z-index:0;
    pointer-events:none;
  }

  /* ── 3D 模型載入 overlay（shadcn Progress 風格） ── */
  .model-loader {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; z-index:10;
    pointer-events:none;
  }
  .model-loader.hidden { display:none; }
  .model-loader-text {
    font-size:13px;
    color:var(--muted-foreground);
    font-family:var(--font-sans);
    letter-spacing:0.01em;
  }
  /* shadcn Progress：外層 track */
  .model-progress-track {
    width:120px; height:8px;
    background:var(--secondary);
    border-radius:9999px;
    overflow:hidden;
  }
  /* shadcn Progress：內層 indicator */
  .model-progress-indicator {
    height:100%;
    background:var(--primary);
    border-radius:9999px;
    width:0%;
    transition:width 0.2s ease;
  }
  .hero-3d model-viewer {
    display:block;
    width:100%;
    height:100%;
    background:transparent;
    --poster-color:transparent;
    --progress-bar-color:transparent;
    --progress-bar-height:0px;
  }
  @media (max-width:760px) {
    .hero-3d { display:none; }
  }

  /* ── Glass element mixin ── */
  .glass-el {
    background: var(--glass-el-bg);
    border: 1px solid var(--glass-el-border);
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    box-shadow:
      inset 0 0 0 1px var(--glass-shine-top),
      inset 1.5px 2px 0px -1.5px var(--glass-shine-top),
      inset -1.5px -2px 0px -1.5px var(--glass-shine-bottom),
      0px 2px 12px 0px var(--glass-pill-shadow);
    transition: box-shadow .2s;
  }
  .glass-el:hover {
    animation: glassStretch 360ms cubic-bezier(1, 0.0, 0.4, 1);
  }
  @keyframes glassStretch {
    0%, 100% { scale: 1 1; }
    45%      { scale: 1.08 1; }
  }
  /* Card uses a slightly gentler stretch */
  .glass-container {
    border-radius:var(--radius-lg);
    padding:0 24px;
    overflow:hidden;
  }
  .glass-card:hover {
    animation: glassStretchCard 360ms cubic-bezier(1, 0.0, 0.4, 1);
  }
  @keyframes glassStretchCard {
    0%, 100% { scale: 1 1; }
    45%      { scale: 1.04 1; }
  }
  .hero-badge { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--text-tertiary); border-radius:100px; padding:5px 14px; margin-bottom:28px; white-space:nowrap; }
  .hero-badge-dot { width:6px; height:6px; min-width:6px; background:#22c55e; border-radius:50%; display:inline-block; }
  .hero-title { font-size:clamp(44px,6vw,68px); font-weight:700; line-height:1.15; letter-spacing:-.02em; margin-bottom:24px; }
  .hero-title em { font-style:normal; color:var(--text); }
  .hero-desc { font-size:22px; color:var(--text-secondary); line-height:1.9; margin-bottom:44px; }
  .hero-contacts { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px; }
  .contact-item { display:flex; align-items:center; gap:8px; font-size:16px; color:var(--text-secondary); border-radius:100px; padding:8px 18px; text-decoration:none; }
  .contact-item:hover { color:var(--text); }
  .hero-note { font-size:14px; color:var(--text-tertiary); padding:10px 14px; border-left:2px solid var(--border-strong); background:var(--bg-secondary); border-radius:0 var(--radius-sm) var(--radius-sm) 0; max-width:420px; }

  .sec-label { font-size:13px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-tertiary); margin-bottom:32px; }
  .skill-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:56px; }
  .skill-card { border-radius:var(--radius-lg); padding:20px; }
  .skill-card-icon { width:36px; height:36px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; margin-bottom:14px; font-size:18px; }
  .skill-card-title { font-size:16px; font-weight:500; margin-bottom:10px; }
  .skill-tag-list { display:flex; flex-wrap:wrap; gap:6px; }
  .tools-grid { display:flex; flex-wrap:wrap; gap:10px; }
  .tool-item { display:flex; align-items:center; gap:8px; font-size:16px; padding:14px 18px; border-radius:var(--radius-md); color:var(--text-secondary); }
  .tool-name { font-weight:500; color:var(--text); font-size:16px; }
  .tool-desc { font-size:13px; color:var(--text-tertiary); }

  .projects-grid { display:flex; flex-direction:column; }
  .project-row { display:grid; grid-template-columns:1fr auto; align-items:start; gap:16px; padding:32px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .project-cover { width:160px; height:90px; object-fit:cover; border-radius:var(--radius-md); border:1px solid var(--border); flex-shrink:0; display:block; }
  .project-cover-empty { width:160px; height:90px; border-radius:var(--radius-md); border:1px dashed var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--bg-secondary); }
  .project-cover-empty-icon { font-size:20px; opacity:0.25; }
  .modal-cover { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; border-radius:var(--radius-lg) var(--radius-lg) 0 0; border-bottom:1px solid var(--border); margin-bottom:0; }
  .modal-cover-wrap { margin:0 0 20px; overflow:hidden; border-radius:var(--radius-md); }
  .modal-cover-wrap img { width:100%; aspect-ratio:32/9; object-fit:cover; display:block; }
  .projects-grid { border-top:none; }
  .project-row:hover .project-row-title { color:var(--text); }
  .project-row-num { font-size:13px; color:var(--text-tertiary); font-family:var(--font-sans); margin-bottom:6px; }
  .project-row-title { font-size:22px; font-weight:600; margin-bottom:8px; color:var(--text); transition:color .15s; }
  .project-row-desc { font-size:16px; color:var(--text-secondary); line-height:1.7; max-width:520px; margin-bottom:12px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .project-tags { display:flex; flex-wrap:wrap; gap:6px; }

<script>
// ── Supabase 連線設定（直接寫在這裡）──
const SUPABASE_URL = 'https://wlxlhyieypohktsvwuuc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndseGxoeWlleXBvaGt0c3Z3dXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTYxNTAsImV4cCI6MjA5NTM3MjE1MH0.KbgbCGBCoJA6ybawKDTHp6w-Tl_dGpE0RVgbaiFgv3Y';

// 原生 fetch 直接打 Supabase REST API，完全不使用 SDK
// 避免 @supabase/supabase-js 的 BroadcastChannel / postMessage 觸發 DataCloneError
function sbFetch(table, params = '') {
  return fetch(
    `${SUPABASE_URL}/rest/v1/${table}?${params}`,
    {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Accept': 'application/json',
      }
    }
  ).then(r => r.json());
}

async function loadData() {
  try {
    const [profile, skills, tools, projects, notes] = await Promise.all([
      sbFetch('profile', 'limit=1'),
      sbFetch('skills', 'order=sort_order'),
      sbFetch('tools',  'order=sort_order'),
      sbFetch('projects', 'published=eq.true&order=sort_order'),
      sbFetch('notes',    'published=eq.true&order=sort_order'),
    ]);
    if (profile?.[0])  renderProfile(profile[0]);
    if (skills?.length)  renderSkills(skills);
    if (tools?.length)   renderTools(tools);
    if (projects?.length) renderProjects(projects);
    if (notes?.length)   renderNotes(notes);
  } catch (e) { renderFallback(); }
}

function renderProfile(p) {
  const heroTitle = (p.name || '您好，我是林艾奭').trim();
  const navName = (p.nav_name && p.nav_name.trim()) || '林艾奭';
  document.getElementById('hero-title').textContent = heroTitle;
  document.getElementById('nav-name').textContent = navName;
  document.getElementById('footer-name').textContent = navName + ' · UI/UX Designer';
  document.getElementById('hero-desc').innerHTML = p.description || '';
  document.getElementById('hero-note').textContent = p.note || '';
  const contacts = document.getElementById('hero-contacts');
  contacts.innerHTML = '';
  if (p.email) contacts.innerHTML += `<a href="mailto:${p.email}" class="contact-item glass-el"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>${p.email}</a>`;
  if (p.phone) contacts.innerHTML += `<span class="contact-item glass-el"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.5 10.5a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.41 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${p.phone}</span>`;
  document.getElementById('footer-email').href = 'mailto:' + (p.email || '');
}

function renderSkills(data) {
  if (!data.length) { document.getElementById('skills-grid').innerHTML = ''; return; }
  document.getElementById('skills-grid').innerHTML = data.map(s => `
    <div class="skill-card glass-el glass-card">
      <div class="skill-card-icon">${s.icon || '🎨'}</div>
      <div class="skill-card-title">${s.title}</div>
      <div class="skill-tag-list">${(s.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderTools(data) {
  if (!data.length) { document.getElementById('tools-grid').innerHTML = ''; return; }
  document.getElementById('tools-grid').innerHTML = data.map(t => `
    <div class="tool-item glass-el"><div><div class="tool-name">${t.name}</div>${t.description ? `<div class="tool-desc">${t.description}</div>` : ''}</div></div>
  `).join('');
}

let allProjects = [];
function renderProjects(data) {
  allProjects = data;
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';
  data.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'project-row';
    row.setAttribute('role', 'button');
    row.setAttribute('tabindex', '0');
    row.onclick = () => openModal(p.id);
    row.onkeydown = (e) => { if (e.key === 'Enter') openModal(p.id); };

    const coverUrl = parseImgArr(p.images)[0] || '';
    const coverEl = document.createElement(coverUrl ? 'img' : 'div');
    if (coverUrl) {
      coverEl.className = 'project-cover';
      coverEl.src = coverUrl;
      coverEl.alt = p.title + ' 封面';
      coverEl.loading = 'lazy';
      coverEl.onerror = function() {
        const e = document.createElement('div');
        e.className = 'project-cover-empty';
        e.innerHTML = '<span class="project-cover-empty-icon">🖼</span>';
        this.parentNode.replaceChild(e, this);
      };
    } else {
      coverEl.className = 'project-cover-empty';
      coverEl.innerHTML = '<span class="project-cover-empty-icon">🖼</span>';
    }

    const tags = (p.tags||[]).map(t => {
      const s = document.createElement('span');
      s.className = 'tag'; s.textContent = t; return s.outerHTML;
    }).join('');

    const right = document.createElement('div');
    right.className = 'project-row-right';

function openNote(id) {
  const n = allNotes.find(x => x.id === id);
  if (!n) return;
  const contentHtml = n.content
    ? `<div class="note-content">${n.content}</div>`
    : `<p class="note-empty">此篇隨筆尚未加入內容。</p>`;
  document.getElementById('modal-header-content').innerHTML =
    '<h2 class="modal-title">' + n.title + '</h2>' +
    '<div class="modal-meta" style="margin-top:8px;flex-direction:column;align-items:flex-start;gap:6px">' +
      (n.note_date ? '<span class="modal-time">' + formatDate(n.note_date) + '</span>' : '') +
      (n.note_type ? '<div style="display:flex;flex-wrap:wrap;gap:6px">' + n.note_type.split('·').map(t=>t.trim()).filter(Boolean).map(t=>'<span class="note-type">'+t+'</span>').join('') + '</div>' : '') +
    '</div>';
  document.getElementById('modal-content').innerHTML = contentHtml;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openModal(id) {
  const p = allProjects.find(x => x.id === id);
  if (!p) return;

  const imgs = parseImgArr(p.images);
  const coverUrl = imgs[0] || '';

  // Header: tags + title + meta
  const tagsHtml = (p.tags||[]).map(t => { const s = document.createElement('span'); s.className='tag'; s.textContent=t; return s.outerHTML; }).join('');
  const membersHtml = p.members ? p.members.split('·').map(m => { const s=document.createElement('span'); s.className='tag'; s.textContent=m.trim(); return s.outerHTML; }).filter(Boolean).join('') : '';

  document.getElementById('modal-header-content').innerHTML =
    '<h2 class="modal-title">' + p.title + '</h2>' +
    '<div class="modal-meta" style="margin-top:8px;flex-direction:column;align-items:flex-start;gap:8px">' +
      (p.time_range ? '<span class="modal-time">' + p.time_range + '</span>' : '') +
      (membersHtml ? '<div style="display:flex;flex-wrap:wrap;gap:6px">' + membersHtml + '</div>' : '') +
      '<div style="display:flex;flex-wrap:wrap;gap:6px">' + tagsHtml + '</div>' +
    '</div>';

  // Body: cover → description → sections → rest images
  const body = document.getElementById('modal-content');
  body.innerHTML = '';

  // Cover image full width
  if (coverUrl) {
    const coverWrap = document.createElement('div');
    coverWrap.className = 'modal-cover-wrap';
    const coverImg = document.createElement('img');
    coverImg.src = coverUrl;
    coverImg.alt = p.title;
    coverImg.loading = 'lazy';
    coverWrap.appendChild(coverImg);
    body.appendChild(coverWrap);
  }

  // Sections first
  const sections = (p.sections && p.sections.length) ? p.sections : [];
  if (sections.length) {
    const grid = document.createElement('div');
    grid.className = 'modal-grid';
    if (coverUrl) grid.style.marginTop = '20px';
    sections.forEach(s => {
      if (!s.title) return;
      const block = document.createElement('div');
      block.className = 'modal-block glass-el';
      const lines = (s.items||[]).flatMap(x => x ? x.split('\n') : []).map(l=>l.trim()).filter(Boolean);
      block.innerHTML = '<p class="modal-block-label">' + s.title + '</p>' +
        (lines.length ? '<ul>' + lines.map(l=>'<li>'+l+'</li>').join('') + '</ul>' : '');
      grid.appendChild(block);
    });
    body.appendChild(grid);
  }

  // Content (rich text) after sections
  if (p.content) {
    const desc = document.createElement('div');
    desc.className = 'modal-desc';
    desc.style.marginTop = '20px';
    desc.innerHTML = p.content;
    body.appendChild(desc);
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); document.body.style.overflow = ''; }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function parseImgArr(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(Boolean);
  if (typeof val === 'string') {
    try { const parsed = JSON.parse(val); return Array.isArray(parsed) ? parsed.filter(Boolean) : []; }
    catch { return []; }
  }
  return [];
}
function stripHtml(html) { const tmp = document.createElement('div'); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ''; }
function formatDate(d) { if (!d) return ''; const [y,m,day] = d.split('-'); return `${y}.${m}.${day}`; }

// ── Theme toggle ──
function getSystemTheme() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function getTheme() {
  return localStorage.getItem('theme') || 'system';
}
function applyTheme(theme) {
  const effective = theme === 'system' ? getSystemTheme() : theme;
  document.documentElement.setAttribute('data-theme', effective);
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const isSystem = theme === 'system';
  if (effective === 'dark') {
    btn.textContent = '☀️';
    btn.setAttribute('data-tip', isSystem ? '切換為亮色模式（目前跟隨系統：暗色）' : '切換為亮色模式');
  } else {
    btn.textContent = '🌙';
    btn.setAttribute('data-tip', isSystem ? '切換為暗色模式（目前跟隨系統：亮色）' : '切換為暗色模式');
  }
}
function toggleTheme() {
  const current = getTheme();
  const system = getSystemTheme();
  let next;
  if (current === 'system') {
    next = system === 'dark' ? 'light' : 'dark';
  } else {
    next = 'system';
  }
  document.documentElement.classList.add('theme-transitioning');
  localStorage.setItem('theme', next);
  applyTheme(next);
  setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 550);
}
// Listen for system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (getTheme() === 'system') applyTheme('system');
});
// Init on load
applyTheme(getTheme());

// Nav scroll highlight
const sections = ['about','projects','notes'];
const navLinks = document.querySelectorAll('.nav-link[data-section]');
// ── Glass Nav pill ──
function getPillMetrics(link) {
  const navEl = document.getElementById('nav-links');
  if (!navEl || !link) return null;
  const navRect = navEl.getBoundingClientRect();
  const linkRect = link.getBoundingClientRect();
  return { x: linkRect.left - navRect.left - 4, w: linkRect.width };
}

// Move pill without stretch (scroll)
function setPillPosition(link) {
  const navEl = document.getElementById('nav-links');
  const m = getPillMetrics(link);
  if (!m || !navEl) return;
  navEl.style.setProperty('--pill-x', m.x + 'px');
  navEl.style.setProperty('--pill-w', m.w + 'px');
}

// Move pill with stretch animation (hover)
function movePillTo(link) {
  const navEl = document.getElementById('nav-links');
  const m = getPillMetrics(link);
  if (!m || !navEl) return;
  navEl.classList.remove('hover-slide');
  void navEl.offsetWidth;
  navEl.classList.add('hover-slide');
  navEl.style.setProperty('--pill-x', m.x + 'px');
  navEl.style.setProperty('--pill-w', m.w + 'px');
}

// Hover behaviour
document.addEventListener('DOMContentLoaded', () => {
  const navEl = document.getElementById('nav-links');
  if (!navEl) return;
  navEl.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('mouseenter', () => movePillTo(link));
  });
  navEl.addEventListener('mouseleave', () => {
    const active = navEl.querySelector('.nav-link.active');
    if (active) movePillTo(active);
  });
  // Init pill position
  setTimeout(() => {
    const active = navEl.querySelector('.nav-link.active');
    if (active) setPillPosition(active);
  }, 100);
});

function updateNav() {
  let current = 'about';
  sections.forEach(id => { const el = document.getElementById(id); if (el && window.scrollY >= el.offsetTop - 100) current = id; });
  navLinks.forEach(link => link.classList.toggle('active', link.dataset.section === current));
  // Update pill position on scroll (no stretch)
  const active = document.querySelector('.nav-link.active');
  if (active) setPillPosition(active);
}
window.addEventListener('scroll', updateNav, { passive: true });

// ── 3D 模型載入進度（model-viewer progress 事件） ──
(function() {
  const model    = document.getElementById('hero-model');
  const loader   = document.getElementById('model-loader');
  const bar      = document.getElementById('model-progress-indicator');
  const label    = document.getElementById('model-loader-text');
  if (!model || !loader) return;

  model.addEventListener('progress', (e) => {
    const pct = Math.round(e.detail.totalProgress * 100);
    if (bar)   bar.style.width   = pct + '%';
    if (label) label.textContent = `載入中 ${pct}%`;
  });

  model.addEventListener('load', () => {
    if (bar)   bar.style.width   = '100%';
    if (label) label.textContent = '載入中 100%';
    setTimeout(() => {
      if (loader) loader.classList.add('hidden');
      // 確保 model-viewer 本身可見
      model.style.visibility = 'visible';
      model.style.opacity = '1';
    }, 400);
  });

  // 備援：若 load 事件未觸發，3 秒後強制隱藏 loader
  setTimeout(() => {
    if (loader && !loader.classList.contains('hidden')) {
      loader.classList.add('hidden');
    }
  }, 3000);

  model.addEventListener('error', () => {
    if (label) label.textContent = '載入失敗';
  });
})();

// ── Scroll-based 3D model rotation（rAF 節流） ──
(function() {
  const model = document.getElementById('hero-model');
  if (!model) return;
  let ticking = false;
  let lastScrollY = 0;
  window.addEventListener('scroll', () => {
    lastScrollY = window.scrollY;
    if (!ticking) {
      requestAnimationFrame(() => {
        model.cameraOrbit = `${25 + lastScrollY * 0.3}deg 75deg auto`;
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();
